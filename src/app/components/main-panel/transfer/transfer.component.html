<h1>Transações</h1>

<div>
  <mat-card class="example-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title-group>
        <mat-card-title>Saldo em Conta</mat-card-title>
      </mat-card-title-group>
    </mat-card-header>
    <mat-card-content>
      {{formatBRL(balanceValue)}}
    </mat-card-content>
  </mat-card>
</div>


<div class="info-row">
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title-group>
          <mat-card-title>TED</mat-card-title>
        </mat-card-title-group>
      </mat-card-header>
      <mat-card-content style="
      padding-top: 16px;">
        <button mat-flat-button (click)="fazerTransferencia()">Enviar TED</button>
      </mat-card-content>
    </mat-card>
    <mat-card class="example-card" appearance="outlined">
      <mat-card-header>
        <mat-card-title-group>
          <mat-card-title>Trazer Dinheiro</mat-card-title>
        </mat-card-title-group>
      </mat-card-header>
      <mat-card-content style="
      padding-top: 16px;">
        <button mat-flat-button (click)="gerarBoleto()">Gerar Boleto</button>
      </mat-card-content>
    </mat-card>
</div>
